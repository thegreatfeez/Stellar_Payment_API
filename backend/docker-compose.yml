services:
  redis:
    image: redis:7-alpine
    container_name: stellar-payment-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    image: node:20-alpine
    container_name: stellar-payment-api
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install && npm run dev"
    env_file:
      - .env
    ports:
      - "4000:4000"
    depends_on:
      redis:
        condition: service_healthy
